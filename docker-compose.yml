services:
  telegram-bot-api:
    image: sayyid5416/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - EXTRA_ARGS=--local --http-port=8081 --dir=/var/lib/telegram-bot-api
    volumes:
      - ./data/tg-bot-api:/var/lib/telegram-bot-api

  onedrive-web-uploader:
    build: .
    container_name: onedrive-web-uploader
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "/app/onedrive_web_uploader.py"]
    volumes:
      - ./data/queue:/sync
      - ./data/browser-profile:/data/browser-profile

  tg-onedrive-bot:
    build: .
    container_name: tg-onedrive-bot
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
      - onedrive-web-uploader
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_API_BASE_URL=http://telegram-bot-api:8081/bot
      - TELEGRAM_BOT_API_BASE_FILE_URL=http://telegram-bot-api:8081/file/bot
      - TELEGRAM_LOCAL_MODE=true
      - ONEDRIVE_LOCAL_SYNC_DIR=/sync
    volumes:
      - ./data/queue:/sync
