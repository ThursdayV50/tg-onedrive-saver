services:
  telegram-bot-api:
    image: ghcr.io/tdlib/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --api-id=${TELEGRAM_API_ID}
      - --api-hash=${TELEGRAM_API_HASH}
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --local
    volumes:
      - ./data/tg-bot-api:/var/lib/telegram-bot-api

  onedrive:
    image: driveone/onedrive:edge
    container_name: onedrive-sync
    restart: unless-stopped
    command:
      - --monitor
      - --upload-only
      - --remove-source-files
    environment:
      - ONEDRIVE_UID=${ONEDRIVE_UID:-1000}
      - ONEDRIVE_GID=${ONEDRIVE_GID:-1000}
    volumes:
      - ./data/onedrive-conf:/onedrive/conf
      - ./data/onedrive-sync:/onedrive/data

  tg-onedrive-bot:
    build: .
    container_name: tg-onedrive-bot
    restart: unless-stopped
    depends_on:
      - telegram-bot-api
      - onedrive
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_API_BASE_URL=http://telegram-bot-api:8081/bot
      - TELEGRAM_BOT_API_BASE_FILE_URL=http://telegram-bot-api:8081/file/bot
      - TELEGRAM_LOCAL_MODE=false
      - ONEDRIVE_LOCAL_SYNC_DIR=/sync
    volumes:
      - ./data/onedrive-sync:/sync
